{% extends "base.html" %}
{% block titel %} — {{ t('ange_kod') }}{% endblock %}
{% block innehall %}
<div class="card" style="max-width:340px;margin:1.5rem auto 0">
  <h2 style="margin-top:0">{% if setup %}{{ t('verifiera_admin') }}{% else %}{{ t('ange_kod') }}{% endif %}</h2>
  <p class="muted" style="margin-top:0;font-size:.82rem">{{ t('kod_mailad') }} <strong>{{ epost }}</strong></p>
  {% if fel %}<div class="fel">{{ fel }}</div>{% endif %}
  <form method="post">
    <input type="text" name="kod" autofocus inputmode="numeric"
           autocomplete="one-time-code" placeholder="000000"
           style="margin-bottom:.7rem;text-align:center;letter-spacing:.3em;font-size:1.2rem">
    <button type="submit" style="width:100%">{{ t('logga_in') }}</button>
  </form>
  <p class="muted" style="margin:.7rem 0 0;font-size:.8rem;text-align:center">
    <a href="{{ url_for('login') }}" style="color:var(--accent)">{{ t('annan_adress') }}</a>
  </p>
</div>
{% endblock %}
