{% extends "base.html" %}
{% block titel %} — SSH{% endblock %}
{% block undertitel %}SSH-anslutningar{% endblock %}
{% block topphoger %}<a class="btn ghost" href="{{ url_for('home') }}">← Tillbaka</a>{% endblock %}
{% block innehall %}
<div class="card">
  <h2>Ny anslutning</h2>
  <form id="ny" class="term-form" style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">
    <div style="grid-column:1/-1">
      <label>Host (t.ex. 10.44.0.5 på VPN-nätet)</label>
      <input type="text" id="host" placeholder="10.44.0.5" style="margin-bottom:0">
    </div>
    <div>
      <label>Användare</label>
      <input type="text" id="user" autocapitalize="none" style="margin-bottom:0">
    </div>
    <div>
      <label>Port</label>
      <input type="text" id="port" value="22" style="margin-bottom:0">
    </div>
    <div style="grid-column:1/-1;margin-top:.6rem">
      <button type="submit">Anslut (nytt fönster)</button>
    </div>
  </form>
</div>

<div class="card">
  <h2>Sparade anslutningar</h2>
  <div id="lista"></div>
  <p class="muted" id="tom" style="margin-bottom:0">Inga sparade än — anslut ovan
    så frågar vi om du vill spara.</p>
</div>

<script>
const NYCKEL = 'tunnelo_ssh';
const las = () => JSON.parse(localStorage.getItem(NYCKEL) || '[]');
const spara = (l) => localStorage.setItem(NYCKEL, JSON.stringify(l));
const idFor = (c) => `${c.user}@${c.host}:${c.port}`;

// Öppnar SSH-sessionen i ett NYTT fönster (host/user/port i URL, aldrig lösen).
function oppna(c){
  const q = new URLSearchParams({host:c.host, user:c.user, port:c.port});
  window.open('/terminal/session?' + q.toString(), '_blank',
              'width=900,height=620,noopener');
}

function rita(){
  const lista = document.getElementById('lista');
  let conns = las();
  // favoriter överst
  conns.sort((a,b) => (b.favorit?1:0) - (a.favorit?1:0));
  document.getElementById('tom').style.display = conns.length ? 'none' : 'block';
  lista.innerHTML = '';
  conns.forEach((c) => {
    const rad = document.createElement('div');
    rad.className = 'row';
    rad.innerHTML = `
      <div style="flex:1;cursor:pointer" class="oppna">
        <strong>${idFor(c)}</strong>
      </div>
      <div style="display:flex;gap:.4rem">
        <button class="btn ghost stjarna" title="Favorit">${c.favorit ? '★' : '☆'}</button>
        <button class="btn danger bort">Ta bort</button>
      </div>`;
    rad.querySelector('.oppna').onclick = () => oppna(c);
    rad.querySelector('.stjarna').onclick = () => {
      const l = las(); const t = l.find(x => idFor(x)===idFor(c));
      if (t){ t.favorit = !t.favorit; spara(l); rita(); }
    };
    rad.querySelector('.bort').onclick = () => {
      spara(las().filter(x => idFor(x)!==idFor(c))); rita();
    };
    lista.appendChild(rad);
  });
}

document.getElementById('ny').addEventListener('submit', (e) => {
  e.preventDefault();
  const c = {
    host: document.getElementById('host').value.trim(),
    user: document.getElementById('user').value.trim(),
    port: (document.getElementById('port').value.trim() || '22'),
    favorit: false
  };
  if (!c.host || !c.user) return;
  // fråga om den ska sparas i listan (om inte redan sparad)
  const finns = las().some(x => idFor(x)===idFor(c));
  if (!finns && confirm('Spara den här anslutningen i listan?')){
    const l = las(); l.push(c); spara(l); rita();
  }
  oppna(c);
});

rita();
</script>
{% endblock %}
