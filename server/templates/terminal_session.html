<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, interactive-widget=resizes-content">
<title>SSH {{ user }}@{{ host }}</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
  html,body{margin:0;height:100%;background:#0d1117;color:#e6edf3;
    font-family:system-ui,-apple-system,sans-serif}
  #login{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  #login .box{background:#161b22;border:1px solid #26303d;border-radius:14px;
    padding:1.6rem;width:min(360px,90vw)}
  #login h1{font-size:1.1rem;margin:0 0 .3rem}
  #login .mono{font-family:ui-monospace,monospace;color:#3fb6ff}
  label{display:block;font-size:.85rem;color:#8b949e;margin:1rem 0 .3rem}
  input{width:100%;box-sizing:border-box;padding:.7rem .8rem;border:1px solid #26303d;
    border-radius:9px;background:#0d1117;color:#e6edf3;font-size:16px}
  .muted{color:#8b949e;font-size:.8rem;margin:.8rem 0 0}
  button{border:0;border-radius:9px;padding:.7rem 1rem;background:#3fb6ff;
    color:#04121f;font-weight:600;cursor:pointer;font-size:.95rem}
  #session{display:none;height:100%;flex-direction:column}
  /* Allt på EN rad längst ned: host + knappar + tangenter, horisontellt scrollbar */
  #botten{flex:0 0 auto;position:relative;border-top:1px solid #26303d;background:#0d1117;
    padding-bottom:env(safe-area-inset-bottom)}
  #rad{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;padding:.4rem .5rem}
  #ctrl{display:flex;gap:.5rem;align-items:center;flex:0 0 auto}
  #ctrl .host{font-family:ui-monospace,monospace;color:#3fb6ff;font-size:.82rem;
    flex:0 0 auto;max-width:11rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #ctrl .ghost{flex:0 0 auto;background:transparent;border:1px solid #26303d;color:#e6edf3;
    padding:.4rem .7rem;font-weight:500;font-size:.82rem;border-radius:8px;white-space:nowrap}
  #ctrl .ghost.pa{background:#3fb6ff;color:#04121f;border-color:#3fb6ff}
  /* Tangenterna – samma rad, direkt efter kontrollknapparna */
  #pilar{flex:0 0 auto;display:flex;gap:.15rem;align-items:center}
  /* display:contents → tangenterna flödar in i #rad och radbryts till fler rader */
  #tbar{display:contents}
  #tbar .k,#pilar .k{flex:0 0 auto;background:#161b22;border:1px solid #26303d;color:#e6edf3;
    font-family:ui-monospace,monospace;font-size:.85rem;padding:.5rem .7rem;
    border-radius:8px;min-width:2.2rem;line-height:1}
  #pilar .k{padding:.5rem .55rem;min-width:2rem}
  #tbar .k.pa{background:#3fb6ff;color:#04121f;border-color:#3fb6ff}
  #tbar .sep,#rad>.sep{flex:0 0 auto;width:1px;align-self:stretch;background:#26303d;margin:.35rem .1rem}
  #meny{margin-bottom:.6rem}
  #meny .rad{padding:.5rem .6rem;border-radius:7px;cursor:pointer;font-size:.85rem;
    font-family:ui-monospace,monospace;display:flex;justify-content:space-between}
  #meny .rad:hover{background:#0d1117}
  #meny .ny{color:#3fb6ff;font-family:system-ui;border-top:1px solid #26303d;margin-top:.3rem;padding-top:.6rem}
  #ctrl .ikonknapp{display:inline-flex;align-items:center;justify-content:center;padding:.35rem .5rem}
  /* Spelar in = röd puls, transkriberar = snurrande blå ikon */
  #mikknapp.rec{color:#ff5555;border-color:#ff5555;animation:mikpuls 1s ease-in-out infinite}
  #mikknapp.busy{color:#3fb6ff;border-color:#3fb6ff}
  #mikknapp.busy svg{animation:miksnurr .8s linear infinite;transform-origin:center}
  @keyframes mikpuls{50%{opacity:.35}}
  @keyframes miksnurr{to{transform:rotate(360deg)}}
  #inst{position:absolute;right:.8rem;bottom:100%;margin-bottom:.3rem;background:#161b22;border:1px solid #26303d;
    border-radius:10px;padding:.7rem;display:none;z-index:6;min-width:210px}
  #inst .grp{font-size:.72rem;color:#8b949e;margin:0 0 .4rem;text-transform:uppercase;letter-spacing:.04em}
  #inst .seg{display:flex;gap:.3rem;margin-bottom:.7rem}
  #inst .seg button{flex:1;background:#0d1117;border:1px solid #26303d;color:#e6edf3;
    padding:.4rem;border-radius:7px;font-size:.8rem}
  #inst .seg button.pa{background:#3fb6ff;color:#04121f;border-color:#3fb6ff}
  #inst .chk{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:#e6edf3;cursor:pointer}
  #mitt{flex:1;min-height:0;position:relative}
  #term{position:absolute;inset:0}
  /* Filpanel (dubbelpanel: lokal | fjärr) */
  #filpanel{position:absolute;inset:0;background:#0d1117;display:none;
    grid-template-columns:1fr 1fr;gap:1px;background:#26303d}
  .fp{background:#0d1117;display:flex;flex-direction:column;min-height:0}
  .fp h3{margin:0;padding:.6rem .8rem;font-size:.85rem;border-bottom:1px solid #26303d;
    display:flex;justify-content:space-between;align-items:center;gap:.5rem}
  .fp .vag{font-family:ui-monospace,monospace;color:#8b949e;font-size:.72rem;
    padding:.3rem .8rem;border-bottom:1px solid #26303d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fp .lista{flex:1;overflow:auto}
  .fp .fil{display:flex;align-items:center;gap:.5rem;padding:.4rem .8rem;cursor:pointer;font-size:.85rem;
    font-family:ui-monospace,monospace;border-bottom:1px solid #161b22}
  .fp .fil:hover{background:#161b22}
  .fp .fil .sz{margin-left:auto;color:#8b949e;font-size:.72rem}
  .fp .verktyg{display:flex;gap:.4rem;padding:.5rem .8rem;border-top:1px solid #26303d;flex-wrap:wrap}
  .fp .verktyg button{padding:.4rem .7rem;font-size:.8rem;background:#161b22;border:1px solid #26303d;color:#e6edf3}
  .fp.drop{outline:2px dashed #3fb6ff;outline-offset:-6px}
  @media(max-width:640px){ #filpanel{grid-template-columns:1fr} }
</style>
</head>
<body>
<div id="login">
  <div class="box">
    <h1>Anslut via SSH</h1>
    <div class="mono">{{ user }}@{{ host }}:{{ port }}</div>
    <label for="password">Lösenord</label>
    <input type="password" id="password" autofocus>
    <div style="margin-top:1rem"><button id="anslut">Anslut</button></div>
    <p class="muted">Lösenordet skickas direkt till servern och sparas aldrig.</p>
  </div>
</div>

<div id="session">
  <div id="mitt">
    <div id="term"></div>
    <div id="filpanel">
      <div class="fp" id="fpLokal">
        <h3>Lokalt <button class="ghost" id="valjMapp" style="font-size:.75rem;padding:.25rem .5rem">Välj mapp</button></h3>
        <div class="vag" id="lokalVag">— ingen mapp vald —</div>
        <div class="lista" id="lokalLista"></div>
        <div class="verktyg"><button id="syncUpp">Sync → server</button></div>
      </div>
      <div class="fp" id="fpFjarr">
        <h3>Server ({{ host }})</h3>
        <div class="vag" id="fjarrVag">~</div>
        <div class="lista" id="fjarrLista"></div>
        <div class="verktyg"><button id="syncNer">Sync ← server</button></div>
      </div>
    </div>
  </div>
  <div id="botten">
    <div id="rad">
      <div id="ctrl">
        <button class="ghost ikonknapp" id="mikknapp" title="Håll inne och tala (Whisper tal-till-text)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
        </button>
        <button class="ghost ikonknapp" id="refreshknapp" title="Rita om skärmen (bra vid återanslutning)">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12a9 9 0 1 1-3-6.7L21 8M21 3v5h-5"/></svg>
        </button>
        <button class="ghost ikonknapp" id="kopieraknapp" title="{{ 'Copy selection' if lang=='en' else 'Kopiera markering' }}">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button class="ghost ikonknapp" id="klistraknapp" title="{{ 'Paste' if lang=='en' else 'Klistra in' }}">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 4h2a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg>
        </button>
        <button class="ghost" id="instknapp" title="{{ 'Menu & settings' if lang=='en' else 'Meny & inställningar' }}">⚙</button>
      </div>
      <div id="pilar">
        <button class="k" data-pil="up" title="↑">↑</button>
        <button class="k" data-pil="down" title="↓">↓</button>
        <button class="k" data-pil="left" title="←">←</button>
        <button class="k" data-pil="right" title="→">→</button>
      </div>
      <span class="sep"></span>
      <div id="tbar"></div>
      <button class="ghost" id="filknapp" style="flex:0 0 auto">Filer</button>
    </div>
    <div id="inst">
      <div class="grp" style="opacity:.7">{{ user }}@{{ host }}</div>
      <div class="grp">{{ 'Connections' if lang=='en' else 'Anslutningar' }}</div>
      <div id="meny"></div>
      <div class="grp" style="margin-top:.6rem">{{ 'Shortcuts' if lang=='en' else 'Snabbtangenter' }}</div>
      <div class="seg" id="segTang" style="flex-wrap:wrap">
        <button data-val="claude">Claude</button>
        <button data-val="cli">CLI</button>
        <button data-val="tmux">tmux</button>
        <button data-val="screen">screen</button>
      </div>
      <label class="chk"><input type="checkbox" id="chkFiler"> {{ 'Show Files button' if lang=='en' else 'Visa Filer-knapp' }}</label>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>
const HOST = {{ host|tojson }}, USER = {{ user|tojson }}, PORT = {{ port|tojson }};
const LANG = {{ lang|tojson }};
const tr = (sv, en) => LANG === 'en' ? en : sv;   // enkel tvåspråkighet
const NYCKEL = 'tunnelo_ssh';
let sock = null, term = null, fit = null, aktivtAuth = null;
let startKommando = '', startSkickat = false;  // körs automatiskt vid anslutning

// Sparade anslutningar hämtas från servern (sanningen), inte localStorage
let MINA = [];
async function laddaMina(){
  try { const r = await fetch('/anslutningar'); const d = await r.json();
    MINA = Array.isArray(d.anslutningar) ? d.anslutningar : []; } catch(e){}
  return MINA;
}
function minPost(){ return MINA.find(c => c.user===USER && c.host===HOST && String(c.port)===String(PORT)); }
let avsiktligStang = false, aterBackoff = 1000;  // för auto-återanslutning

// Opcode-prefix: '0'=tangenttryck, '1'=resize, '2'=ping
const PEKSKARM = matchMedia('(pointer: coarse)').matches;  // mobil/surfplatta
let senasteMarkering = '';  // senaste markerade texten (även om den hunnit släckas)
// Fånga även webbläsarens egen markering (mobil långtryck markerar ibland så)
document.addEventListener('selectionchange', () => {
  const s = window.getSelection ? String(window.getSelection()) : '';
  if(s.trim()) senasteMarkering = s;
});
function skicka(d){
  if(sock && sock.readyState === 1) sock.send('0' + d);
  // Fokusera bara på dator, eller om terminalen redan har fokus —
  // annars öppnar snabbtangenterna mobilens tangentbord i onödan
  if(term && (!PEKSKARM || document.activeElement === term.textarea)) term.focus();
}
// Klistra in från urklipp. Chrome frågar om tillstånd första gången — visa
// en hint i terminalen om svaret dröjer (annars ser det ut som att inget händer).
function klistra(){
  let klart = false;
  setTimeout(() => { if(!klart) term.write('\r\n\x1b[33m[' +
    tr('väntar på urklipps-tillstånd – klicka Tillåt uppe vid adressfältet',
       'waiting for clipboard permission – click Allow near the address bar') + ']\x1b[0m\r\n'); }, 1200);
  navigator.clipboard.readText()
    .then(t => { klart = true; if(t) skicka(t); })
    .catch(() => { klart = true; term.write('\r\n\x1b[31m[' +
      tr('urklippsåtkomst nekad','clipboard access denied') + ']\x1b[0m\r\n'); });
}
function skickaResize(){
  if(fit) fit.fit();
  if(sock && sock.readyState === 1 && term)
    sock.send('1' + JSON.stringify({cols:term.cols, rows:term.rows}));
}

function anslutMed(auth){
  aktivtAuth = auth;
  document.getElementById('login').remove();
  document.getElementById('session').style.display = 'flex';
  term = new Terminal({fontSize:14, theme:{background:'#0d1117'}});
  fit = new FitAddon.FitAddon(); term.loadAddon(fit);
  term.open(document.getElementById('term')); fit.fit();
  // Kopiera/klistra in (Ctrl+Shift+C är webbläsarens DevTools – kan ej blockeras):
  //  Ctrl+C  = kopiera OM text är markerad, annars vanligt avbryt (^C)
  //  Ctrl+Insert = kopiera · Shift+Insert / Ctrl+Shift+V = klistra in
  term.attachCustomKeyEventHandler((e) => {
    if(e.type !== 'keydown') return true;
    const kopiera = () => { const s = term.getSelection();
      if(s){ navigator.clipboard.writeText(s).catch(()=>{}); term.clearSelection(); return true; } return false; };
    if(e.ctrlKey && !e.shiftKey && (e.code === 'KeyC' || e.code === 'Insert')){
      if(kopiera()){ e.preventDefault(); return false; }
      if(e.code === 'Insert'){ e.preventDefault(); return false; }  // Insert ska aldrig skickas
      return true;                                                  // ingen markering → låt ^C avbryta
    }
    if((e.shiftKey && e.code === 'Insert') || (e.ctrlKey && e.shiftKey && e.code === 'KeyV')){
      klistra();
      e.preventDefault(); return false;
    }
    return true;
  });
  term.onData(skicka);
  // Kom ihåg senaste markeringen — mobilen släcker den när man trycker på
  // kopiera-knappen, så knappen måste kunna kopiera i efterhand
  term.onSelectionChange(() => { const s = term.getSelection(); if(s) senasteMarkering = s; });
  window.addEventListener('resize', skickaResize);
  if(window.visualViewport) window.visualViewport.addEventListener('resize', skickaResize);
  // Återanslut direkt när fliken blir synlig igen (mobil: skärm låst/upp)
  document.addEventListener('visibilitychange', () => {
    if(!document.hidden && (!sock || sock.readyState > 1)) kopplaSocket();
  });
  // Håll websocketen vaken genom proxy under inaktivitet
  setInterval(() => { if(sock && sock.readyState === 1) sock.send('2'); }, 20000);
  kopplaSocket();
}

// Skapar (eller återskapar) websocketen mot samma term/auth
function kopplaSocket(){
  if(sock && (sock.readyState === 0 || sock.readyState === 1)) return;  // redan igång
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  sock = new WebSocket(proto + '://' + location.host + '/terminal/ws');
  sock.onopen = () => {
    aterBackoff = 1000;
    sock.send(JSON.stringify(Object.assign(
      {host:HOST, port:PORT, user:USER, cols:term.cols, rows:term.rows}, aktivtAuth)));
    setTimeout(() => { skickaResize(); skicka('\x0c'); }, 300);  // matcha storlek + rita om
    if(!PEKSKARM) term.focus();  // på mobil: öppna inte tangentbordet automatiskt
  };
  sock.onmessage = (ev) => {
    term.write(ev.data);
    // Kör startkommandot en kort stund efter första skal-utdatan (ej vid återanslutning)
    if(startKommando && !startSkickat){
      startSkickat = true;
      setTimeout(() => skicka(startKommando + '\r'), 500);
    }
  };
  sock.onclose = () => {
    if(avsiktligStang) return;
    term.write('\r\n\x1b[33m[' + tr('återansluter…','reconnecting…') + ']\x1b[0m\r\n');
    setTimeout(kopplaSocket, aterBackoff);
    aterBackoff = Math.min(aterBackoff * 2, 5000);  // backoff upp till 5 s
  };
}
function anslut(){ anslutMed({password: document.getElementById('password').value}); }
document.getElementById('anslut').addEventListener('click', anslut);
document.getElementById('password').addEventListener('keydown', (e) => { if(e.key==='Enter') anslut(); });
// Bygg startkommando utifrån vald SSH-klient (sessionsläge) + ev. eget kommando.
// tmux/screen = beständig session som överlever frånkoppling (mobil, nätbyte).
function byggStart(klient, cmd, mus){
  if(klient === 'tmux'){
    // "tmux set -g mouse on \; new …" slår på mus globalt före anslutning
    const pre = mus ? 'tmux set -g mouse on \\; ' : 'tmux ';
    return cmd ? `${pre}new -A -s tunnelo -- bash -lc '${cmd}; exec bash'` : `${pre}new -A -s tunnelo`;
  }
  if(klient === 'screen')
    return cmd ? `screen -DR tunnelo bash -lc '${cmd}; exec bash'` : 'screen -DR tunnelo';
  return cmd || '';
}
// Init körs längst ned när allt är definierat (se initAnslutning())

// Bottenrad med snabbtangenter. Riktiga escape-sekvenser (JS-strängar så \x tolkas).
// Ctrl+bokstav = teckenkod & 0x1f (t.ex. Ctrl+C = \x03, Ctrl+L = \x0c).
const SEKV = {
  stab:'\x1b[Z', esc:'\x1b', ee:'\x1b\x1b', tab:'\t',
  up:'\x1b[A', down:'\x1b[B', left:'\x1b[D', right:'\x1b[C', ret:'\r',
  cc:'\x03', cd:'\x04', cr:'\x12', cl:'\x0c', cz:'\x1a',
  ca:'\x01', ce:'\x05', ck:'\x0b', cu:'\x15', cw:'\x17'
};
// Tangentuppsättningar. {k:...} = sekvens ovan, {x:...} = råtecken, {s:1} = avdelare.
// Ordning: vanligast först. Verktygstips (t) tvåspråkiga via tr().
const CLAUDE = [
  {k:'esc',l:'Esc',t:tr('Esc – avbryt','Esc – cancel')},
  {k:'stab',l:'⇧Tab',t:tr('Shift+Tab – växla läge','Shift+Tab – switch mode')},
  {k:'cc',l:'^C',t:'Ctrl+C'},
  {x:'/',l:'/',t:tr('Slash-kommando','Slash command')}, {x:'@',l:'@',t:tr('Nämn fil','Mention file')},
  {k:'cr',l:'^R',t:tr('Visa mer utdata','Show more output')},
  {s:1},
  {x:'claude -r\r',l:'claude -r',t:tr('Återuppta Claude-session','Resume Claude session')},
  {k:'tab',l:'Tab',t:tr('Komplettera filväg','Complete path')}, {k:'ee',l:'Esc·Esc',t:tr('Ångra/redigera förra','Undo/edit last')},
  {k:'ret',l:'⏎'}
];
const CLI = [
  {k:'cc',l:'^C',t:tr('Avbryt','Cancel')}, {k:'cl',l:'^L',t:tr('Rensa skärm','Clear screen')},
  {k:'tab',l:'Tab',t:tr('Komplettera','Complete')}, {k:'cr',l:'^R',t:tr('Sök historik','Search history')},
  {k:'cd',l:'^D',t:tr('EOF/avsluta','EOF/exit')}, {k:'esc',l:'Esc'}, {k:'cz',l:'^Z',t:tr('Pausa','Suspend')},
  {s:1}, {k:'ca',l:'^A',t:tr('Radbörjan','Line start')}, {k:'ce',l:'^E',t:tr('Radslut','Line end')},
  {k:'cu',l:'^U',t:tr('Radera till början','Delete to start')}, {k:'ck',l:'^K',t:tr('Radera till slut','Delete to end')},
  {k:'cw',l:'^W',t:tr('Radera ord','Delete word')}, {s:1},
  {x:'|',l:'|'}, {x:'~',l:'~'}, {x:'-',l:'-'}, {k:'ret',l:'⏎'}
];
// tmux: prefix Ctrl+b (\x02) + tangent. screen: prefix Ctrl+a (\x01) + tangent.
const TMUX = [
  {x:'\x02c',l:tr('Nytt','New'),t:tr('Ctrl+b c – nytt fönster','Ctrl+b c – new window')},
  {x:'\x02n',l:'→win',t:tr('Ctrl+b n – nästa fönster','Ctrl+b n – next window')},
  {x:'\x02p',l:'←win',t:tr('Ctrl+b p – föregående fönster','Ctrl+b p – previous window')},
  {x:'\x02w',l:tr('Lista','List'),t:tr('Ctrl+b w – lista fönster','Ctrl+b w – list windows')}, {s:1},
  {x:'\x02%',l:tr('Dela│','Split│'),t:tr('Ctrl+b % – dela lodrätt','Ctrl+b % – split vertical')},
  {x:'\x02"',l:tr('Dela─','Split─'),t:tr('Ctrl+b " – dela vågrätt','Ctrl+b " – split horizontal')},
  {x:'\x02z',l:'Zoom',t:tr('Ctrl+b z – zooma panel','Ctrl+b z – zoom pane')},
  {x:'\x02o',l:tr('Panel','Pane'),t:tr('Ctrl+b o – nästa panel','Ctrl+b o – next pane')},
  {x:'\x02x',l:tr('Stäng','Close'),t:tr('Ctrl+b x – stäng panel','Ctrl+b x – close pane')}, {s:1},
  {x:'\x02[',l:tr('Skrolla','Scroll'),t:tr('Ctrl+b [ – bläddra (q avslutar)','Ctrl+b [ – scroll (q to exit)')},
  {x:'\x02d',l:tr('Koppla','Detach'),t:tr('Ctrl+b d – koppla från','Ctrl+b d – detach')}
];
const SCREEN = [
  {x:'\x01c',l:tr('Nytt','New'),t:tr('Ctrl+a c – nytt fönster','Ctrl+a c – new window')},
  {x:'\x01n',l:'→win',t:tr('Ctrl+a n – nästa fönster','Ctrl+a n – next window')},
  {x:'\x01p',l:'←win',t:tr('Ctrl+a p – föregående fönster','Ctrl+a p – previous window')},
  {x:'\x01"',l:tr('Lista','List'),t:tr('Ctrl+a " – lista fönster','Ctrl+a " – list windows')}, {s:1},
  {x:'\x01S',l:tr('Dela─','Split─'),t:tr('Ctrl+a S – dela vågrätt','Ctrl+a S – split horizontal')},
  {x:'\x01|',l:tr('Dela│','Split│'),t:tr('Ctrl+a | – dela lodrätt','Ctrl+a | – split vertical')},
  {x:'\x01\t',l:tr('Panel','Pane'),t:tr('Ctrl+a Tab – nästa del','Ctrl+a Tab – next region')},

  {x:'\x01d',l:tr('Koppla','Detach'),t:tr('Ctrl+a d – koppla från','Ctrl+a d – detach')}
];
const UPPSATTN = {claude:CLAUDE, cli:CLI, tmux:TMUX, screen:SCREEN};
const TANGENT_ORDNING = ['claude', 'cli', 'tmux', 'screen'];

// Inställningar (per webbläsare, sparas i localStorage)
const INST_NYCKEL = 'tunnelo_term_inst';
function lasInst(){ try { return JSON.parse(localStorage.getItem(INST_NYCKEL)) || {}; } catch(e){ return {}; } }
function sparaInst(o){ localStorage.setItem(INST_NYCKEL, JSON.stringify(o)); }
let inst = Object.assign({tset:['claude'], filer:true}, lasInst());
// Migrera gammalt enkelval (tangenter) → flervalslista (tset)
if(inst.tangenter && !Array.isArray(inst.tset)){
  inst.tset = inst.tangenter === 'bada' ? ['claude','cli'] : [inst.tangenter];
}
if(!Array.isArray(inst.tset)) inst.tset = ['claude'];
delete inst.tangenter;

// Spara snabbtangentvalet på anslutningen (granulärt → kläm ingen annan)
function sparaTset(){
  const m = minPost();
  if(!m) return;
  m.tset = (inst.tset || []).slice();
  fetch('/anslutningar/spara', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({anslutning: m})}).catch(()=>{});
}

function ritaTbar(){
  const tbar = document.getElementById('tbar'); tbar.innerHTML = '';
  const sep = () => { const s=document.createElement('span'); s.className='sep'; tbar.appendChild(s); };
  const valda = TANGENT_ORDNING.filter(n => (inst.tset || []).includes(n));
  valda.forEach((namn, i) => {
    if(i > 0) sep();                      // avdelare mellan uppsättningar
    UPPSATTN[namn].forEach(d => {
      if(d.s){ sep(); return; }
      const b = document.createElement('button'); b.className='k'; b.textContent = d.l;
      if(d.t) b.title = d.t;
      b.addEventListener('click', () => skicka(d.k ? SEKV[d.k] : d.x));
      b.addEventListener('mousedown', e => e.preventDefault()); // behåll fokus i terminalen
      tbar.appendChild(b);
    });
  });
}
function tillampaInst(){
  document.getElementById('filknapp').style.display = inst.filer ? '' : 'none';
  document.querySelectorAll('#segTang button').forEach(b =>
    b.classList.toggle('pa', (inst.tset || []).includes(b.dataset.val)));
  document.getElementById('chkFiler').checked = inst.filer;
  ritaTbar();
  if(fit) fit.fit();
}

document.getElementById('refreshknapp').addEventListener('click', () => { skickaResize(); skicka('\x0c'); });

// Kopiera markering / klistra in (knappar – samma som Ctrl+Shift+C/V)
const kopKn = document.getElementById('kopieraknapp');
kopKn.addEventListener('mousedown', e => e.preventDefault());
kopKn.addEventListener('click', () => {
  // Ta aktuell markering om den finns, annars den senast sparade
  // (mobilen släcker markeringen redan när man trycker på knappen)
  const sel = (term && term.getSelection()) || senasteMarkering;
  if(sel){
    navigator.clipboard.writeText(sel).catch(()=>{});
    if(term) term.clearSelection();
    senasteMarkering = '';
    // Grön blink som kvitto — skriv inget i terminalen (du kan ha skrollat upp)
    kopKn.style.color = '#3fb950';
    setTimeout(() => { kopKn.style.color = ''; }, 900);
  } else {
    // Röd blink = ingen markering att kopiera
    kopKn.style.color = '#f85149';
    setTimeout(() => { kopKn.style.color = ''; }, 900);
  }
});
document.getElementById('klistraknapp').addEventListener('mousedown', e => e.preventDefault());
document.getElementById('klistraknapp').addEventListener('click', () => klistra());

document.querySelectorAll('#pilar .k').forEach(b => {
  b.addEventListener('mousedown', e => e.preventDefault());
  b.addEventListener('click', () => skicka(SEKV[b.dataset.pil]));
});

// --- Mikrofon push-to-talk: håll inne, tala, släpp → Whisper skriver texten ---
(function(){
  const mik = document.getElementById('mikknapp');
  let rec = null, bitar = [], spelar = false;

  async function start(e){
    e.preventDefault();
    if(spelar) return;
    try {
      const strom = await navigator.mediaDevices.getUserMedia({audio:true});
      rec = new MediaRecorder(strom);
      bitar = [];
      rec.ondataavailable = ev => bitar.push(ev.data);
      rec.onstop = () => { strom.getTracks().forEach(t => t.stop()); skickaLjud(); };
      rec.start();
      spelar = true;
      mik.classList.add('rec');            // röd = spelar in
    } catch(err){ term.write(`\r\n\x1b[31m[mik: ${err.message}]\x1b[0m\r\n`); }
  }
  function stopp(e){
    if(e) e.preventDefault();
    if(!spelar || !rec) return;
    spelar = false; rec.stop();
    mik.classList.remove('rec'); mik.classList.add('busy');   // dämpad = transkriberar
  }
  async function skickaLjud(){
    const blob = new Blob(bitar, {type:'audio/webm'});
    const fd = new FormData(); fd.append('ljud', blob, 'tal.webm');
    try {
      const r = await fetch('/stt', {method:'POST', body:fd});
      const d = await r.json();
      if(d.text) skicka(d.text);       // skriv texten (utan Enter — granska själv)
      else term.write(`\r\n\x1b[33m[${tr('inget tal uppfattat','no speech detected')}]\x1b[0m\r\n`);
    } catch(err){ term.write(`\r\n\x1b[31m[${tr('stt-fel','stt error')}: ${err.message}]\x1b[0m\r\n`); }
    mik.classList.remove('busy');
  }
  // Fungerar för både mus och touch (pointer-events)
  mik.addEventListener('pointerdown', start);
  mik.addEventListener('pointerup', stopp);
  mik.addEventListener('pointerleave', stopp);
  mik.addEventListener('pointercancel', stopp);
})();

document.getElementById('instknapp').addEventListener('click', async () => {
  const p = document.getElementById('inst'); const visa = p.style.display !== 'block';
  if(visa){ await laddaMina(); byggMeny(); }   // färsk lista från servern varje gång

// ---- Filpanel (SFTP + lokalt filsystem) ----
let fjarrVag = '.', lokalDir = null;
const filIkon = (dir) => dir
  ? '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#3fb6ff" stroke-width="1.8"><path d="M3 7h6l2 2h10v10H3z"/></svg>'
  : '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#8b949e" stroke-width="1.8"><path d="M6 2h9l3 3v17H6z"/></svg>';
const storlek = (n) => n<1024?n+' B':n<1048576?(n/1024).toFixed(0)+' kB':(n/1048576).toFixed(1)+' MB';

async function sftpJSON(ep, extra){
  const body = Object.assign({host:HOST, user:USER, port:PORT}, aktivtAuth, extra);
  const r = await fetch('/sftp/'+ep, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  return r.json();
}
function credFält(fd){ fd.append('host',HOST); fd.append('user',USER); fd.append('port',PORT);
  if(aktivtAuth.password) fd.append('password',aktivtAuth.password);
  if(aktivtAuth.private_key) fd.append('private_key',aktivtAuth.private_key); }

async function ritaFjarr(){
  const d = await sftpJSON('list', {path: fjarrVag});
  if(d.fel){ document.getElementById('fjarrLista').innerHTML = `<div class="fil">Fel: ${d.fel}</div>`; return; }
  fjarrVag = d.path;
  document.getElementById('fjarrVag').textContent = fjarrVag;
  const lista = document.getElementById('fjarrLista'); lista.innerHTML = '';
  const upp = document.createElement('div'); upp.className='fil'; upp.innerHTML = filIkon(true)+'<span>..</span>';
  upp.onclick = () => { fjarrVag = fjarrVag.replace(/\/[^/]+$/, '') || '/'; ritaFjarr(); }; lista.appendChild(upp);
  d.poster.forEach(p => { const el = document.createElement('div'); el.className='fil';
    el.innerHTML = `${filIkon(p.dir)}<span>${p.namn}</span>${p.dir?'':`<span class="sz">${storlek(p.storlek)}</span>`}`;
    el.onclick = () => { if(p.dir){ fjarrVag = (fjarrVag.replace(/\/$/,'')) + '/' + p.namn; ritaFjarr(); }
                         else laddaNer(p.namn); }; lista.appendChild(el); });
}
async function laddaNer(namn){
  if(!lokalDir){ alert('Välj en lokal mapp först.'); return; }
  const body = Object.assign({host:HOST,user:USER,port:PORT,path:fjarrVag+'/'+namn}, aktivtAuth);
  const r = await fetch('/sftp/download', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const blob = await r.blob();
  const fh = await lokalDir.getFileHandle(namn, {create:true});
  const w = await fh.createWritable(); await w.write(blob); await w.close();
  ritaLokal();
}
async function laddaUpp(namn){
  const fh = await lokalDir.getFileHandle(namn); const file = await fh.getFile();
  const fd = new FormData(); credFält(fd); fd.append('path', fjarrVag); fd.append('fil', file, namn);
  await fetch('/sftp/upload', {method:'POST', body:fd}); ritaFjarr();
}
async function ritaLokal(){
  const lista = document.getElementById('lokalLista'); lista.innerHTML = '';
  if(!lokalDir) return;
  document.getElementById('lokalVag').textContent = lokalDir.name + '/';
  const poster = [];
  for await (const [namn, h] of lokalDir.entries()) poster.push({namn, dir:h.kind==='directory'});
  poster.sort((a,b)=>(a.dir!==b.dir)?(a.dir?-1:1):a.namn.localeCompare(b.namn));
  poster.forEach(p => { const el = document.createElement('div'); el.className='fil';
    el.innerHTML = `${filIkon(p.dir)}<span>${p.namn}</span>`;
    if(!p.dir) el.onclick = () => laddaUpp(p.namn); lista.appendChild(el); });
}
document.getElementById('valjMapp').addEventListener('click', async () => {
  try { lokalDir = await window.showDirectoryPicker(); ritaLokal(); }
  catch(e){ /* avbrutet */ }
});
document.getElementById('syncUpp').addEventListener('click', async () => {
  if(!lokalDir){ alert('Välj lokal mapp först.'); return; }
  const d = await sftpJSON('list', {path: fjarrVag});
  const finns = new Set((d.poster||[]).filter(p=>!p.dir).map(p=>p.namn));
  for await (const [namn, h] of lokalDir.entries())
    if(h.kind==='file' && !finns.has(namn)) await laddaUpp(namn);
  ritaFjarr();
});
document.getElementById('syncNer').addEventListener('click', async () => {
  if(!lokalDir){ alert('Välj lokal mapp först.'); return; }
  const lokala = new Set(); for await (const [namn, h] of lokalDir.entries()) if(h.kind==='file') lokala.add(namn);
  const d = await sftpJSON('list', {path: fjarrVag});
  for(const p of (d.poster||[])) if(!p.dir && !lokala.has(p.namn)) await laddaNer(p.namn);
});
// drag-and-drop upp på fjärrpanelen
const fjarrEl = document.getElementById('fpFjarr');
fjarrEl.addEventListener('dragover', e => { e.preventDefault(); fjarrEl.classList.add('drop'); });
fjarrEl.addEventListener('dragleave', () => fjarrEl.classList.remove('drop'));
fjarrEl.addEventListener('drop', async e => {
  e.preventDefault(); fjarrEl.classList.remove('drop');
  for(const file of e.dataTransfer.files){
    const fd = new FormData(); credFält(fd); fd.append('path', fjarrVag); fd.append('fil', file, file.name);
    await fetch('/sftp/upload', {method:'POST', body:fd});
  }
  ritaFjarr();
});
document.getElementById('filknapp').addEventListener('click', () => {
  const p = document.getElementById('filpanel'); const visa = p.style.display !== 'grid';
  p.style.display = visa ? 'grid' : 'none';
  document.getElementById('filknapp').classList.toggle('pa', visa);
  if(visa){ ritaFjarr(); if(lokalDir) ritaLokal(); }
});

// Init: hämta anslutningarna från servern, ställ in denna anslutning och koppla upp
async function initAnslutning(){
  await laddaMina();
  const m = minPost();
  if(m){
    startKommando = byggStart(m.klient, m.cmd || '', m.mus !== false);
    if(Array.isArray(m.tset)) inst.tset = m.tset.slice();
    else inst.tset = m.klient==='tmux' ? ['tmux','claude']
                   : m.klient==='screen' ? ['screen','claude'] : ['claude'];
    tillampaInst();
    if(m.pkey) return anslutMed({private_key:m.pkey});
    if(m.losen) return anslutMed({password:m.losen});
  }
  // Ingen sparad auth → låt användaren skriva lösenord (login-rutan visas redan)
}
initAnslutning();
