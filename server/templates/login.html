{% extends "base.html" %}
{% block titel %} — logga in{% endblock %}
{% block innehall %}
<div class="card">
  <h2>Logga in</h2>
  {% if fel %}<div class="fel">{{ fel }}</div>{% endif %}
  <form method="post">
    <label for="losen">Lösenord</label>
    <input type="password" id="losen" name="losen" autofocus>
    <button type="submit">Logga in</button>
  </form>
</div>
{% endblock %}
