[tunnelo]
# Adressen till koordinationsservern.
server_url = http://localhost:8080

# Delad token — måste matcha serverns TUNNELO_TOKEN.
token = hemlig-token-byt-mig

# Ett namn på den här noden (fritt val).
namn = min-laptop

# Din endpoint utåt: <publik-ip>:<port>. Andra noder skickar hit.
# Vid test på egen maskin duger localhost, men för riktig tunnel mellan
# maskiner måste detta vara en IP som de andra noderna når.
endpoint = 127.0.0.1:51820

# Namn på nätverksinterfacet som skapas.
interface = tunnelo0
